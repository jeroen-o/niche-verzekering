<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Pagina niet gevonden — Nicheverzekeringen</title>
<style>
:root{
  --ink:#152C41;--ink-70:rgba(21,44,65,.72);--paper:#F4F2ED;--paper-2:#FFFFFF;
  --teal:#1A4E7A;--teal-dark:#123A5C;--stamp:#D96A20;
  --sans:"TT Norms Pro","TT Norms","Avenir Next",Avenir,"Segoe UI",system-ui,-apple-system,Helvetica,Arial,sans-serif;
  --serif:"TT Norms Pro Serif",Georgia,"Iowan Old Style","Times New Roman",serif;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--paper);color:var(--ink);font-family:var(--sans);padding:32px;-webkit-font-smoothing:antialiased}
.card{max-width:560px;background:var(--paper-2);border:1px solid rgba(21,44,65,.14);
  border-radius:26px;padding:44px 40px;text-align:center}
.code{font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--stamp);margin-bottom:16px}
h1{font-size:clamp(28px,5vw,40px);font-weight:700;letter-spacing:-.02em;line-height:1.1;margin:0 0 16px}
p{font-family:var(--serif);font-size:18px;line-height:1.55;color:var(--ink-70);margin:0 0 28px}
a{display:inline-block;background:var(--teal);color:#fff;text-decoration:none;font-weight:600;
  font-size:15px;padding:14px 28px;border-radius:999px;transition:background .18s}
a:hover{background:var(--teal-dark)}
a:focus-visible{outline:3px solid var(--stamp);outline-offset:3px}
</style>
</head>
<body>
  <div class="card">
    <div class="code">Fout 404</div>
    <h1>Deze pagina is er niet</h1>
    <p>De link klopt niet meer of is verkeerd overgenomen. Ga terug naar de startpagina en zoek verder vanaf daar.</p>
    <a href="/">Naar de startpagina</a>
  </div>
</body>
</html>
